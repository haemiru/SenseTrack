<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "sage": "#789689",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>SenseTrack AI Dashboard</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full max-w-[430px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden border-x border-slate-200 dark:border-slate-800 shadow-xl">
<!-- Header Section -->
<header class="sticky top-0 z-50 flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md p-4 pb-3 justify-between border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-2">
<div class="text-primary flex size-10 shrink-0 items-center justify-center bg-primary/10 rounded-lg">
<span class="material-symbols-outlined text-2xl">monitoring</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-extrabold leading-tight tracking-tight">SenseTrack AI</h1>
</div>
<div class="flex items-center">
<div class="bg-emerald-50 dark:bg-emerald-900/20 px-3 py-1.5 rounded-full flex items-center gap-2">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
</span>
<p class="text-emerald-700 dark:text-emerald-400 text-xs font-bold leading-normal tracking-wide">호흡 및 반응 추적 중</p>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 pb-24">
<!-- Hero: Camera Viewport -->
<div class="p-4">
<div class="relative flex flex-col items-center justify-center bg-slate-900 aspect-video rounded-xl overflow-hidden shadow-inner group" data-alt="Facial recognition mesh overlay on a person face" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAk9JJTtxj9R4wcl7ogkjBOqJbH4x9Ee_2u5SLA2LINWBUBmCEgMNqI7hG-2b4W1m7ga8MkX9UkeXzRfoMz50Ax5Fs6FzorZcnkv62okMpYKsoRbt7FByz9RqDvLIhbkG9f1-7yqAz2xrC5OlLYFSXrFY0TGV8JkFv_8ixjL8wdKdSEc0BhDU1osh77hWcku6tKPkrFt4vEfmaQKrbEdeqaYonHD0FFHjQwUxlXg-y8F6mI4Gm_25Ir77Y3j1-cIYP8EuICSAgqubM3"); background-size: cover; background-position: center;'>
<!-- Real-time dB Waveform Overlay -->
<div class="absolute top-3 right-3 bg-black/50 backdrop-blur-md px-2 py-1 rounded border border-white/20 flex items-end gap-0.5 h-8">
<div class="w-1 bg-emerald-400 h-1/2"></div>
<div class="w-1 bg-emerald-400 h-3/4"></div>
<div class="w-1 bg-emerald-400 h-full"></div>
<div class="w-1 bg-emerald-400 h-2/3"></div>
<div class="w-1 bg-emerald-400 h-1/3 text-[8px] text-white ml-1 font-mono">42dB</div>
</div>
<!-- Face Mesh Effect Overlay -->
<div class="absolute inset-0 border-2 border-primary/30 rounded-xl pointer-events-none flex items-center justify-center">
<svg class="w-full h-full opacity-40 text-primary" viewbox="0 0 100 100">
<path d="M50 20 C60 20 75 35 75 55 C75 75 60 85 50 85 C40 85 25 75 25 55 C25 35 40 20 50 20" fill="none" stroke="currentColor" stroke-dasharray="2 2" stroke-width="0.5"></path>
<circle cx="38" cy="45" fill="currentColor" r="2"></circle>
<circle cx="62" cy="45" fill="currentColor" r="2"></circle>
<path d="M40 70 Q50 75 60 70" fill="none" stroke="currentColor" stroke-width="1"></path>
</svg>
</div>
<button class="flex shrink-0 items-center justify-center rounded-full size-14 bg-white/10 backdrop-blur-sm text-white hover:bg-white/20 transition-all">
<span class="material-symbols-outlined text-3xl fill-1">pause</span>
</button>
<div class="absolute bottom-3 left-3 flex gap-2">
<span class="bg-red-500 text-[10px] text-white px-2 py-0.5 rounded font-bold uppercase tracking-widest">LIVE</span>
<span class="bg-black/40 text-[10px] text-white px-2 py-0.5 rounded font-medium">CAM 01 - AI ANALYSIS</span>
</div>
</div>
</div>
<!-- Stimulus Control Section -->
<div class="px-4 py-2">
<div class="flex items-center justify-between mb-4">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">자극 제어 (Stimulus Control)</h3>
<div class="flex gap-1">
<div class="bg-primary/10 text-primary px-3 py-1 rounded-lg font-mono font-bold text-lg">00</div>
<div class="text-slate-400 pt-1">:</div>
<div class="bg-primary/10 text-primary px-3 py-1 rounded-lg font-mono font-bold text-lg">05</div>
</div>
</div>
<div class="grid grid-cols-2 gap-3 mb-6">
<button class="flex flex-col items-center justify-center gap-2 rounded-xl h-24 p-3 bg-white dark:bg-slate-800 border-2 border-primary/20 hover:border-primary transition-all shadow-sm">
<span class="material-symbols-outlined text-emerald-600 text-2xl">eco</span>
<span class="text-slate-800 dark:text-slate-200 text-sm font-bold truncate">후각 자극 키트 A</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 rounded-xl h-24 p-3 bg-white dark:bg-slate-800 border-2 border-primary/20 hover:border-primary transition-all shadow-sm">
<span class="material-symbols-outlined text-primary text-2xl">equalizer</span>
<span class="text-slate-800 dark:text-slate-200 text-sm font-bold truncate">청각 자극 B</span>
</button>
</div>
</div>
<!-- Metrics Grid -->
<div class="px-4">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight mb-4">실시간 분석 지표</h3>
<div class="grid grid-cols-2 gap-3">
<!-- Metric Card 1 -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium mb-1">호흡 안정도</p>
<div class="flex items-end justify-between">
<span class="text-2xl font-black text-slate-900 dark:text-slate-100">85%</span>
<span class="material-symbols-outlined text-emerald-500 text-sm">trending_up</span>
</div>
<div class="w-full bg-slate-100 dark:bg-slate-700 h-1 rounded-full mt-3">
<div class="bg-emerald-500 h-1 rounded-full w-[85%]"></div>
</div>
</div>
<!-- Metric Card 2 -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium mb-1">자극 반응 시간</p>
<div class="flex items-end justify-between">
<span class="text-2xl font-black text-slate-900 dark:text-slate-100">1.2<small class="text-sm font-normal ml-0.5">초</small></span>
<span class="material-symbols-outlined text-primary text-sm">timer</span>
</div>
<p class="text-[10px] text-slate-400 mt-2">평균 대비 -0.2s</p>
</div>
<!-- Metric Card 3 -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium mb-1">고개 움직임 각도</p>
<div class="flex items-end justify-between">
<span class="text-2xl font-black text-slate-900 dark:text-slate-100">우측 15<small class="text-sm font-normal ml-0.5">도</small></span>
<span class="material-symbols-outlined text-amber-500 text-sm">screen_rotation</span>
</div>
<p class="text-[10px] text-slate-400 mt-2">정면 응시 유지 중</p>
</div>
<!-- Metric Card 4 -->
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium mb-1">발성 지속 시간</p>
<div class="flex items-end justify-between">
<span class="text-2xl font-black text-slate-900 dark:text-slate-100">3.5<small class="text-sm font-normal ml-0.5">초</small></span>
<span class="material-symbols-outlined text-indigo-500 text-sm">mic</span>
</div>
<p class="text-[10px] text-slate-400 mt-2">최대 지속 5.1s</p>
</div>
</div>
</div>
</main>
<!-- Sticky Footer Button -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] p-4 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md border-t border-slate-100 dark:border-slate-800">
<button class="w-full h-14 bg-sage hover:bg-opacity-90 text-white rounded-xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-sage/20 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">analytics</span>
                측정 종료 및 리포트 생성
            </button>
</div>
</div>
</body></html>
